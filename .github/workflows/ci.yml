name: CI

# Dispara o workflow em pushes e pull requests para a branch main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
      # 1. Baixa o código do repositório para a VM
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configura a versão do Python
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # 3. Instala as dependências do projeto
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Verifica se todos os arquivos .py compilam sem erros de sintaxe
      - name: Verificar sintaxe (compileall)
        run: python -m compileall -q .
